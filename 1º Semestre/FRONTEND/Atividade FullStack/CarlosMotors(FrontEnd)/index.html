<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Loja de Carros</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Carros Premium</h1>
        <button id="btnAbrirModal" class="btn-add">Adicionar Novo Carro</button>
    </header>

    <main id="gridCarros" class="grid-container">
        
    </main>

    <div id="modalCarro" class="modal oculto">
        <div class="card">
            <span id="btnFecharModal" class="close">&times;</span>
            <h2>Cadastrar Veículo</h2>
            <form id="formCarro">
                <input type="text" id="nome" placeholder="Nome do Carro" required>
                <input type="text" id="marca" placeholder="Marca" required>
                <input type="number" id="ano" placeholder="Ano" required>
                <input type="text" id="preco" placeholder="Preço" required>
                <input type="url" id="imagem" placeholder="URL da Imagem" required>
                <button type="submit" class="btn-save">Salvar Carro</button>
            </form>
        </div>
    <script src="script.js"></script>
</body>
</html>
